// infra_admin.proto — typed contracts for the host-side infra.admin
// workflow module's HTTP surface. Sole serialization shape is
// protojson over HTTP. v1 is read-only — mutations remain in
// `wfctl infra apply/destroy/drift`.
//
// Design: docs/plans/2026-05-27-infra-admin-dynamic-design.md §Strict Proto Contracts
// Plan:   docs/plans/2026-05-27-infra-admin-dynamic.md (Task 4)
//
// Hard invariants:
//   - Every typed input carries AdminAuthzEvidence. Read endpoints
//     require evidence.authz_checked && evidence.authz_allowed.
//     Default-deny semantics.
//   - Free-form per-resource AppliedConfig / Outputs payloads cross
//     the wire as bytes <name>_json, JSON-encoded by the handler.
//     The handler owns the serialization shape; the proto carries
//     opaque bytes (same pattern as plugin/external/proto/iac.proto).
//   - error field uses tag 100 (uniform discriminator across outputs
//     so generic decoders can sniff for a non-empty error before
//     consuming the typed payload).
//   - The HTTP audit-tail endpoint (GET /api/infra-admin/audit) is
//     NOT exposed as a gRPC RPC — it streams ndjson of
//     AdminAuditEntry directly per design doc §Access logging. The
//     5 declared RPCs cover every typed read endpoint.

syntax = "proto3";

package workflow.iac.v1;

option go_package = "github.com/GoCodeAlone/workflow/iac/admin/proto;adminpb";

// AdminAuthzEvidence carries the host-side authz outcome to handler
// library functions. The handler MUST refuse to serve when
// authz_checked is false (caller bypassed admin auth middleware) or
// authz_allowed is false (caller was denied). Subject + granted
// permissions are recorded in the audit log alongside each request.
message AdminAuthzEvidence {
  bool   authz_checked        = 1;
  bool   authz_allowed        = 2;
  string subject              = 3;
  repeated string granted_permissions = 4;
}

// AdminResourceSummary is the table-row shape for the resources list
// page. provider_module is the host YAML `name:` of the iac.provider
// module that owns this resource; provider_type is the underlying
// cloud provider string (aws/digitalocean/etc) read from that
// module's config.provider field at module Init time.
message AdminResourceSummary {
  string name                 = 1;
  string type                 = 2;     // "infra.vpc"
  string provider_module      = 3;     // host module name (the YAML `name:`)
  string provider_type        = 4;     // from the iac.provider module's config `provider:` field
  string provider_id          = 5;
  string status               = 6;
  int64  updated_at_unix      = 7;
  repeated string dependencies = 8;
  string app_context          = 9;
}

// AdminResourceDetail extends the summary with the full per-resource
// state payload. applied_config_json + outputs_json are JSON-encoded
// by the handler; sensitive_outputs_redacted lists output keys whose
// values were stripped from outputs_json before serialization (the
// raw key names are safe to surface; the values are not).
message AdminResourceDetail {
  AdminResourceSummary summary      = 1;
  bytes  applied_config_json        = 2;
  bytes  outputs_json               = 3;
  string config_hash                = 4;
  int64  last_drift_check_unix      = 5;
  repeated string sensitive_outputs_redacted = 6;
}

// AdminListResourcesInput is the request shape for the ListResources
// RPC. Filters narrow the returned set; evidence carries the host-side
// authz outcome (default-deny semantics).
message AdminListResourcesInput {
  string type_filter          = 1;
  string provider_filter      = 2;
  string app_context_filter   = 3;
  string env_name             = 4;
  AdminAuthzEvidence evidence = 5;
  // Tag 6-99 reserved for future filter additions; tag 100 is the
  // uniform error discriminator on Output messages (Input messages
  // don't carry error but reserve the tag for symmetry).
  reserved 6 to 99, 101 to 199;
}

// AdminListResourcesOutput is the response shape for the ListResources
// RPC. error is set when the handler refused (e.g. authz denied); when
// non-empty, consumers MUST ignore the typed payload.
message AdminListResourcesOutput {
  repeated AdminResourceSummary resources = 1;
  string error = 100;
  // Tag 2-99 reserved for future Output-payload fields; tag 101-199
  // reserved for future Output-side error/diagnostic metadata.
  reserved 2 to 99, 101 to 199;
}

// AdminGetResourceInput is the request shape for the GetResource RPC.
// name is the resource's host-side identity (the YAML `name:`); the
// returned detail includes the full applied config + outputs.
message AdminGetResourceInput {
  string name                 = 1;
  string env_name             = 2;
  AdminAuthzEvidence evidence = 3;
  reserved 4 to 99, 101 to 199;
}

// AdminGetResourceOutput is the response shape for the GetResource RPC.
// Carries AdminResourceDetail when found; error when the resource is
// missing or authz denied.
message AdminGetResourceOutput {
  AdminResourceDetail resource = 1;
  string error = 100;
  reserved 2 to 99, 101 to 199;
}

// AdminFieldSpec describes one field of a typed infra.* Config so the
// new-resource form-builder can render the right input control.
//   - kind: one of {enum, enum_dynamic, string, number, bool,
//     array_string, array_object, object} — see catalog/fields.go.
//   - enum_source (only for kind == enum_dynamic): "providers" |
//     "regions" | "sizes" | "engines" — the form fetches dynamic
//     options at render time.
//   - depends_on_field: when set, this field's options are filtered
//     by the value the user picked for depends_on_field (e.g. region
//     options depend on provider).
//   - element_kind: only meaningful for array_* kinds.
//   - sensitive: when true, the form renders a masked input AND the
//     value is excluded from any rendered preview.
message AdminFieldSpec {
  string name           = 1;
  string label          = 2;
  string kind           = 3;
  bool   required       = 4;
  repeated string enum_values = 5;
  string enum_source    = 6;
  string description    = 7;
  string default_value  = 8;
  bool   sensitive      = 9;
  string element_kind   = 10;
  int32  min_count      = 11;
  int32  max_count      = 12;
  string depends_on_field = 13;
}

// AdminResourceTypeMetadata is the form-builder's view of one
// infra.* Config message. config_message_fqn is the fully-qualified
// proto message name in workflow-plugin-infra/internal/contracts/
// infra.proto (e.g. "workflow.plugins.infra.v1.VPCConfig" — note
// the plural "plugins" matching the vendored proto's package
// declaration; earlier doc-example used "plugin" singular which
// didn't match the wire, see spec-reviewer T6 F2 on commit 1ea231fdd)
// so callers can correlate against the vendored proto descriptor.
message AdminResourceTypeMetadata {
  string type                       = 1;
  string config_message_fqn         = 2;
  repeated AdminFieldSpec fields    = 3;
  repeated string supported_providers = 4;
  string description                = 5;
}

// AdminListResourceTypesInput is the request shape for the
// ListResourceTypes RPC. provider_filter narrows the returned types to
// those a given provider supports.
message AdminListResourceTypesInput {
  string provider_filter = 1;
  AdminAuthzEvidence evidence = 2;
  reserved 3 to 99, 101 to 199;
}

// AdminListResourceTypesOutput is the response shape for the
// ListResourceTypes RPC. types is the form-builder's view of every
// registered infra.* Config (one entry per FieldSpecCatalog type).
message AdminListResourceTypesOutput {
  repeated AdminResourceTypeMetadata types = 1;
  string error = 100;
  reserved 2 to 99, 101 to 199;
}

// AdminProviderSummary is the ListProviders response row. supported_regions
// comes from IaCProviderRegionLister when the provider advertises it and the
// call succeeds; otherwise it falls back to the host-side catalog
// (regions.go). supported_types / supported_engines remain host catalogued.
// regions_source is "provider-lister" or "local-catalog".
message AdminProviderSummary {
  string module_name              = 1;
  string provider_type            = 2;
  repeated string capabilities    = 3;
  repeated string supported_regions = 4;
  repeated string supported_types = 5;
  repeated string supported_engines = 6;
  string regions_source           = 7;  // "provider-lister" or "local-catalog"
}

// AdminListProvidersInput is the request shape for the ListProviders
// RPC. env_name selects the per-environment overlay.
message AdminListProvidersInput {
  string env_name        = 1;
  AdminAuthzEvidence evidence = 2;
  reserved 3 to 99, 101 to 199;
}

// AdminListProvidersOutput is the response shape for the ListProviders
// RPC. One AdminProviderSummary per iac.provider module declared in the
// host's WorkflowConfig.
message AdminListProvidersOutput {
  repeated AdminProviderSummary providers = 1;
  string error = 100;
  reserved 2 to 99, 101 to 199;
}

// AdminGenerateConfigInput carries the form-builder submission.
// field_values is keyed by AdminFieldSpec.name; values are always
// string-encoded (the catalog's kind metadata is the authority for
// coercion to proto types). resource_name is the host YAML `name:`
// the user picked; provider_module references one of the
// AdminProviderSummary.module_name values returned by ListProviders.
message AdminGenerateConfigInput {
  string resource_type   = 1;
  string resource_name   = 2;
  string provider_module = 3;
  // field_values carries the form-builder submission keyed by
  // AdminFieldSpec.name. Single-valued fields (string/enum/bool/
  // number) are encoded as their literal string. Array-shaped
  // fields (kind ∈ {array_string, array_object, array_number,
  // array_enum_dynamic}) are JSON-encoded — e.g.
  //   field_values["ingress"] = "[\"rule a\", \"rule b, c\"]"
  // — so values containing commas, quotes, or other delimiters
  // survive the wire losslessly. The server decodes via
  // json.Unmarshal in iac/admin/handler/generate_config.go.
  //
  // Cross-task contract locked 2026-05-27 between T6 (server) +
  // T10-T12 (form-builder JS). Defensive fallback in the handler
  // wraps a non-JSON literal into a one-element array so a
  // malformed UI submission doesn't crash the server.
  map<string, string> field_values = 4;
  AdminAuthzEvidence evidence = 5;
  reserved 6 to 99, 101 to 199;
}

// AdminGenerateConfigOutput is the response shape for the
// GenerateConfig RPC. yaml_snippet is the typed-coerced YAML the form
// produced; validation_errors carries any per-field validation
// failures the catalog reported (form remains submittable on
// validation_errors — `error` is reserved for handler-level failures
// like authz denial).
message AdminGenerateConfigOutput {
  string yaml_snippet  = 1;
  repeated string validation_errors = 2;
  string error = 100;
  reserved 3 to 99, 101 to 199;
}

// AdminAuditEntry is the line shape for the audit log (one entry per
// non-noop admin action) AND the streaming response shape of the
// HTTP audit-tail endpoint (GET /api/infra-admin/audit). schema_version
// starts at 1; bumps are additive (new fields) until a breaking
// change forces a major.
message AdminAuditEntry {
  int32  schema_version = 1;
  int64  ts_unix        = 2;
  string subject        = 3;
  string action         = 4;
  repeated string targets = 5;
  string result         = 6;
  string app_context    = 7;
}

// InfraAdminService is the typed read surface (v1) plus the v1.1
// mutation surface. v1 has 5 read RPCs; v1.1 adds 4 mutation RPCs
// (Plan/Apply/Destroy/DriftCheck). The HTTP audit-tail endpoint
// (GET /api/infra-admin/audit) streams AdminAuditEntry ndjson outside
// this gRPC service per design doc §Access logging.
//
// v1.1 mutation security chain (per ADR-0007 + ADR-0008):
//   auth(401) → secHdrs → requireBearer(401/CSRF) →
//   server-side authz.Enforce(subject, perm, "allow")(403) →
//   desired_hash/confirm_hash TOCTOU → ValidateAllowReplaceProtected →
//   per-provider TryLock(409)
// Client-supplied AdminAuthzEvidence is audit-only; authz is
// server-authoritative.
service InfraAdminService {
  rpc ListResources(AdminListResourcesInput) returns (AdminListResourcesOutput);
  rpc GetResource(AdminGetResourceInput) returns (AdminGetResourceOutput);
  rpc ListResourceTypes(AdminListResourceTypesInput) returns (AdminListResourceTypesOutput);
  rpc ListProviders(AdminListProvidersInput) returns (AdminListProvidersOutput);
  rpc GenerateConfig(AdminGenerateConfigInput) returns (AdminGenerateConfigOutput);
  // v1.1 mutation RPCs — require write-tier auth (bearer + RBAC).
  rpc PlanResource(AdminPlanInput) returns (AdminPlanOutput);
  rpc ApplyResource(AdminApplyInput) returns (AdminApplyOutput);
  rpc DestroyResource(AdminDestroyInput) returns (AdminDestroyOutput);
  rpc DriftCheckResource(AdminDriftInput) returns (AdminDriftOutput);
}

// --- v1.1 mutation messages ---

// AdminPlanInput is the request shape for the PlanResource RPC.
// Plans only the in-process config (no client-proposed desired state —
// see NEW-M-3). evidence is audit-only; server-side authz.Enforce
// gates the handler (ADR-0007).
message AdminPlanInput {
  string app_context     = 1;
  string resource_filter = 2;
  AdminAuthzEvidence evidence = 3;
  reserved 4 to 99, 101 to 199;
}

// AdminPlanAction is one proposed change in the plan (create/update/
// replace/delete). change_summary is a human-readable diff summary.
message AdminPlanAction {
  string action_type    = 1;
  string resource_name  = 2;
  string type           = 3;
  string change_summary = 4;
  reserved 5 to 99, 101 to 199;
}

// AdminPlanOutput is the response shape for the PlanResource RPC.
// plan_id is opaque; desired_hash is the SHA-256 of the resolved
// desired-state (same input as wfctlhelpers.DesiredStateHash) — the
// client MUST echo it in AdminApplyInput for TOCTOU protection.
// plan_json carries the full plan payload as opaque bytes.
// error tag-100: non-empty → consumer ignores typed payload.
message AdminPlanOutput {
  string plan_id    = 1;
  string desired_hash = 2;
  repeated AdminPlanAction actions = 3;
  bytes  plan_json  = 4;
  string error      = 100;
  reserved 5 to 99, 101 to 199;
}

// AdminApplyInput is the request shape for the ApplyResource RPC.
// plan_id + desired_hash MUST match the values returned by a prior
// PlanResource call (TOCTOU protection per ADR-0008). allow_replace
// is the explicit opt-in list for replace actions; the handler calls
// ValidateAllowReplaceProtected against it. evidence is audit-only.
message AdminApplyInput {
  string plan_id      = 1;
  string desired_hash = 2;
  repeated string allow_replace = 3;
  string app_context  = 4;
  AdminAuthzEvidence evidence = 5;
  reserved 6 to 99, 101 to 199;
}

// AdminApplyOutput is the response shape for the ApplyResource RPC.
// applied carries summaries of successfully applied resources; errors
// carries per-resource failures (provider errors redacted of creds).
// error tag-100: top-level failure (authz / stale-hash / etc).
message AdminApplyOutput {
  repeated AdminResourceSummary applied = 1;
  repeated AdminActionError errors      = 2;
  string error                          = 100;
  reserved 3 to 99, 101 to 199;
}

// AdminActionError carries a per-resource error from an apply or
// destroy operation. Provider error messages have credentials
// redacted before serialization.
message AdminActionError {
  string resource = 1;
  string action   = 2;
  string error    = 3;
  reserved 4 to 99, 101 to 199;
}

// AdminResourceRef identifies a resource by name + type for destroy
// and drift-check operations.
message AdminResourceRef {
  string name = 1;
  string type = 2;
  reserved 3 to 99, 101 to 199;
}

// AdminDestroyInput is the request shape for the DestroyResource RPC.
// refs lists the resources to destroy. confirm_hash is the
// desired-state hash the client must echo for TOCTOU protection
// (same semantics as AdminApplyInput.desired_hash). evidence is
// audit-only.
message AdminDestroyInput {
  repeated AdminResourceRef refs = 1;
  string confirm_hash            = 2;
  AdminAuthzEvidence evidence    = 3;
  reserved 4 to 99, 101 to 199;
}

// AdminDestroyOutput is the response shape for the DestroyResource
// RPC. destroyed lists the names of successfully destroyed resources;
// errors carries per-resource failures. error tag-100: top-level.
message AdminDestroyOutput {
  repeated string destroyed       = 1;
  repeated AdminActionError errors = 2;
  string error                    = 100;
  reserved 3 to 99, 101 to 199;
}

// AdminDriftInput is the request shape for the DriftCheckResource RPC.
// refs narrows the check to the listed resources; an empty refs list
// checks all resources known to the provider. evidence is audit-only.
message AdminDriftInput {
  repeated AdminResourceRef refs = 1;
  AdminAuthzEvidence evidence    = 2;
  reserved 3 to 99, 101 to 199;
}

// AdminDriftResult is one resource's drift check outcome. drifted is
// true when the live cloud state diverges from desired; class is the
// drift category (e.g. "config", "presence"); fields lists the
// specific diverged field names.
message AdminDriftResult {
  string resource_name  = 1;
  string type           = 2;
  bool   drifted        = 3;
  string class          = 4;
  repeated string fields = 5;
  reserved 6 to 99, 101 to 199;
}

// AdminDriftOutput is the response shape for the DriftCheckResource
// RPC. drift carries one entry per checked resource. error tag-100:
// top-level failure (authz / provider unavailable / etc).
message AdminDriftOutput {
  repeated AdminDriftResult drift = 1;
  string error                    = 100;
  reserved 2 to 99, 101 to 199;
}
