<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infra Admin — Audit Log</title>
  <link rel="stylesheet" href="/admin/infra-admin/styles.css">
</head>
<body>
  <h1>Infra Admin — Audit Log</h1>
  <p><a href="/admin/infra-admin/resources.html">&laquo; Back to resources</a></p>

  <div class="form-controls" id="token-row">
    <label class="field-label" for="bearer-token">Bearer token</label>
    <input id="bearer-token" type="password"
           placeholder="paste JWT bearer token"
           autocomplete="off">
  </div>

  <div class="form-controls" id="filter-row">
    <label class="field-label" for="filter-action">Action</label>
    <select id="filter-action">
      <option value="">— all —</option>
      <option value="list_resources">list_resources</option>
      <option value="get_resource">get_resource</option>
      <option value="list_types">list_types</option>
      <option value="list_providers">list_providers</option>
      <option value="generate_config">generate_config</option>
      <option value="plan">plan</option>
      <option value="apply">apply</option>
      <option value="destroy">destroy</option>
      <option value="drift_check">drift_check</option>
    </select>

    <label class="field-label" for="filter-result">Result</label>
    <select id="filter-result">
      <option value="">— all —</option>
      <option value="ok">ok</option>
      <option value="denied">denied</option>
      <option value="error">error</option>
    </select>

    <label class="field-label" for="filter-limit">Limit</label>
    <select id="filter-limit">
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="0">all</option>
    </select>

    <button id="btn-refresh" type="button">Refresh</button>
    <label>
      <input id="auto-refresh" type="checkbox"> Auto-refresh (30 s)
    </label>
  </div>

  <table id="audit-table">
    <thead>
      <tr>
        <th>Time (UTC)</th>
        <th>Subject</th>
        <th>Action</th>
        <th>Targets</th>
        <th>Result</th>
        <th>App context</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <p id="empty-note" class="field-help" hidden>No audit entries found.</p>

  <div id="error" role="alert" aria-live="polite" class="redacted"></div>
  <script src="/admin/infra-admin/actions.js"></script>
</body>
</html>
