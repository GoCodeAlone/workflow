name: Dependency Update

permissions:
  contents: read
  pull-requests: write

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
   - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  # See ci.yml for rationale. Force in-memory diffcache in CI per the
  # T3.5 rev3 lifecycle constraint — no filesystem writes from this
  # workflow's `go test ./...` step.
  WFCTL_DIFFCACHE: ":memory:"

jobs:
  update-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.24'
        cache: true

    - name: Update main dependencies
      run: |
        go get -u ./...
        go mod tidy

    - name: Update example dependencies
      run: |
        cd example
        go get -u ./...
        go mod tidy

    - name: Run tests
      run: |
        go test ./...
        cd example && go build ./...

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Go dependencies'
        title: 'chore: update Go dependencies'
        body: |
          This PR updates Go dependencies to their latest versions.
          
          Changes:
          - Updated dependencies in main go.mod
          - Updated dependencies in example/go.mod
          - Verified tests still pass
          
          Please review the changes and ensure all functionality works as expected.
        branch: chore/update-dependencies
        delete-branch: true