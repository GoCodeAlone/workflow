name: Dependency Update

permissions:
  contents: read

defaults:
  run:
    shell: bash

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
   - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  # See ci.yml for rationale. Force in-memory diffcache in CI per the
  # T3.5 rev3 lifecycle constraint — no filesystem writes from this
  # workflow's `go test ./...` step.
  WFCTL_DIFFCACHE: ":memory:"

jobs:
  update-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        token: ${{ github.token }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Update main dependencies
      run: |
        go get -u ./...
        go mod tidy

    - name: Update example dependencies
      run: |
        cd example
        go get -u ./...
        go mod tidy

    - name: Run tests
      run: |
        go test ./...
        cd example && go build ./...

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ github.token }}
        commit-message: 'chore: update Go dependencies'
        title: 'chore: update Go dependencies'
        body: |
          This PR updates Go dependencies to their latest versions.
          
          Changes:
          - Updated dependencies in main go.mod
          - Updated dependencies in example/go.mod
          - Verified tests still pass
          
          Please review the changes and ensure all functionality works as expected.
        branch: chore/update-dependencies
        delete-branch: true
