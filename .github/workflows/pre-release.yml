name: Pre-release Snapshot

# Creates a pre-release snapshot build on every merge to main.
# These builds are tagged as "snapshot" and are considered unstable.

on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # See ci.yml for rationale. Force in-memory diffcache in CI per the
  # T3.5 rev3 lifecycle constraint.
  WFCTL_DIFFCACHE: ":memory:"

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.5'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/

    - name: Run tests
      run: go test -race ./...

  snapshot:
    name: Build Snapshot Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: read

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.5'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/

    - name: Determine snapshot version
      id: version
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        SNAPSHOT_VERSION="snapshot-${SHORT_SHA}"
        echo "version=${SNAPSHOT_VERSION}" >> "$GITHUB_OUTPUT"

    - name: Build binaries
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-linux-amd64    ./cmd/server
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-linux-arm64    ./cmd/server
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-darwin-amd64   ./cmd/server
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-darwin-arm64   ./cmd/server
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-windows-amd64.exe ./cmd/server

        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-linux-amd64    ./cmd/wfctl
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-linux-arm64    ./cmd/wfctl
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-darwin-amd64   ./cmd/wfctl
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-darwin-arm64   ./cmd/wfctl
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-windows-amd64.exe ./cmd/wfctl

    - name: Package admin UI
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        tar -czf "dist/workflow-admin-ui-${VERSION}.tar.gz" -C ui dist

    - name: Create checksums
      run: |
        cd dist
        sha256sum ./* > checksums.txt

    - name: Clean up old snapshot releases
      run: |
        delete_github_resource() {
          local endpoint="$1"
          local label="$2"
          local response
          local command_status
          local status_line
          local http_status

          if response="$(gh api --include --method DELETE "$endpoint" 2>&1)"; then
            command_status=0
          else
            command_status=$?
          fi
          status_line="${response%%$'\n'*}"
          status_line="${status_line%$'\r'}"
          if [[ ! "$status_line" =~ ^HTTP/[0-9]+(\.[0-9]+)?[[:space:]]+([0-9]{3})([[:space:]].*)?$ ]]; then
            echo "${label} deletion returned a missing or malformed HTTP status" >&2
            printf '%s\n' "$response" >&2
            return 1
          fi
          http_status="${BASH_REMATCH[2]}"
          if [[ "$http_status" == 404 ]]; then
            return 0
          fi
          if [[ "$command_status" -ne 0 ]]; then
            echo "${label} deletion failed with HTTP ${http_status}" >&2
            printf '%s\n' "$response" >&2
            return "$command_status"
          fi
          if [[ "$http_status" =~ ^2[0-9]{2}$ ]]; then
            return 0
          fi
          echo "${label} deletion returned unexpected HTTP ${http_status}" >&2
          printf '%s\n' "$response" >&2
          return 1
        }

        if snapshot_releases="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
          --jq '.[] | select(.tag_name | startswith("snapshot-")) | [.id, .tag_name] | @tsv')"; then
          :
        else
          list_status=$?
          echo "snapshot release listing failed" >&2
          exit "$list_status"
        fi
        while read -r release_id tag extra; do
          [[ -z "$release_id" && -z "$tag" ]] && continue
          if [[ ! "$release_id" =~ ^[0-9]+$ || -z "$tag" || -n "$extra" ]]; then
            echo "snapshot release listing returned malformed data" >&2
            exit 1
          fi
          delete_github_resource \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            "snapshot release ${tag}"
          delete_github_resource \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" \
            "snapshot tag ${tag}"
        done <<< "$snapshot_releases"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Create snapshot release
      run: |
        TAG="snapshot-$(git rev-parse --short HEAD)"
        gh release create "$TAG" \
          --title "Snapshot (${{ steps.version.outputs.version }})" \
          --notes "Automated pre-release snapshot built from the latest commit on \`main\`.

        **Commit**: ${{ github.sha }}
        **Build**: ${{ steps.version.outputs.version }}

        > **Warning**: This is an unstable development build. Use tagged releases for production." \
          --target main \
          --prerelease \
          dist/*
      env:
        GH_TOKEN: ${{ github.token }}

  docker-snapshot:
    name: Build & Push Snapshot Image (ko)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.5'
        cache: false

    - name: Set up ko
      uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

    - name: Log in to GitHub Container Registry
      run: echo "${{ github.token }}" | ko login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Build and push snapshot
      env:
        KO_DOCKER_REPO: ghcr.io/gocodealone/workflow
      run: |
        SHA_SHORT="${GITHUB_SHA:0:7}"

        ko build ./cmd/server \
          --bare \
          --platform=linux/amd64,linux/arm64 \
          --tags="snapshot,main-sha-${SHA_SHORT}" \
          --sbom=spdx
