name: Pre-release Snapshot

# Creates a pre-release snapshot build on every merge to main.
# These builds are tagged as "snapshot" and are considered unstable.

on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # See ci.yml for rationale. Force in-memory diffcache in CI per the
  # T3.5 rev3 lifecycle constraint.
  WFCTL_DIFFCACHE: ":memory:"

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/

    - name: Run tests
      run: go test -race ./...

  snapshot:
    name: Build Snapshot Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: read

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/

    - name: Determine snapshot version
      id: version
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        SNAPSHOT_VERSION="snapshot-${SHORT_SHA}"
        echo "version=${SNAPSHOT_VERSION}" >> "$GITHUB_OUTPUT"

    - name: Build binaries
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-linux-amd64    ./cmd/server
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-linux-arm64    ./cmd/server
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-darwin-amd64   ./cmd/server
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-darwin-arm64   ./cmd/server
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/workflow-windows-amd64.exe ./cmd/server

        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-linux-amd64    ./cmd/wfctl
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-linux-arm64    ./cmd/wfctl
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-darwin-amd64   ./cmd/wfctl
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-darwin-arm64   ./cmd/wfctl
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/wfctl-windows-amd64.exe ./cmd/wfctl

    - name: Package admin UI
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        tar -czf "dist/workflow-admin-ui-${VERSION}.tar.gz" -C ui dist

    - name: Create checksums
      run: |
        cd dist
        sha256sum ./* > checksums.txt

    - name: Clean up old snapshot releases
      run: |
        # Delete all previous snapshot-* releases (keep only latest)
        snapshot_tags="$(gh release list --limit 50 --json tagName --jq '.[] | select(.tagName | startswith("snapshot-")) | .tagName')"
        while read -r tag; do
          [[ -z "$tag" ]] && continue
          gh release delete "$tag" --yes --cleanup-tag
        done <<< "$snapshot_tags"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Create snapshot release
      run: |
        TAG="snapshot-$(git rev-parse --short HEAD)"
        gh release create "$TAG" \
          --title "Snapshot (${{ steps.version.outputs.version }})" \
          --notes "Automated pre-release snapshot built from the latest commit on \`main\`.

        **Commit**: ${{ github.sha }}
        **Build**: ${{ steps.version.outputs.version }}

        > **Warning**: This is an unstable development build. Use tagged releases for production." \
          --target main \
          --prerelease \
          dist/*
      env:
        GH_TOKEN: ${{ github.token }}

  docker-snapshot:
    name: Build & Push Snapshot Image (ko)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up ko
      uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

    - name: Log in to GitHub Container Registry
      run: echo "${{ github.token }}" | ko login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Build and push snapshot
      env:
        KO_DOCKER_REPO: ghcr.io/gocodealone/workflow
      run: |
        SHA_SHORT="${GITHUB_SHA:0:7}"

        ko build ./cmd/server \
          --bare \
          --platform=linux/amd64,linux/arm64 \
          --tags="snapshot,main-sha-${SHA_SHORT}" \
          --sbom=spdx
