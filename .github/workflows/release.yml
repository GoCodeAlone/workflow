name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v1.2.3)'
        required: true
        type: string
    secrets:
      repo_dispatch_token:
        required: true

permissions:
  contents: write
  packages: write

env:
  GOPRIVATE: github.com/GoCodeAlone/*
  GONOSUMCHECK: github.com/GoCodeAlone/*
  TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
  # See ci.yml for rationale. Force in-memory diffcache in CI per the
  # T3.5 rev3 lifecycle constraint.
  WFCTL_DIFFCACHE: ":memory:"

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run tests
      run: go test -race ./...

  build-ui:
    name: Build Admin UI
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      run: cd ui && npm ci
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build admin UI
      run: cd ui && npm run build

    - name: Package admin UI
      run: |
        VERSION=${TAG_NAME}
        tar -czf "workflow-admin-ui-${VERSION}.tar.gz" -C ui dist
        echo "UI_TARBALL=workflow-admin-ui-${VERSION}.tar.gz" >> "$GITHUB_ENV"

    - name: Upload UI artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: admin-ui
        path: workflow-admin-ui-*.tar.gz
        retention-days: 1

  docker:
    name: Build & Push Container Image (ko)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up ko
      uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Build and push
      env:
        GOPRIVATE: github.com/GoCodeAlone/*
        GONOSUMCHECK: github.com/GoCodeAlone/*
        GOFLAGS: -mod=mod
      run: |
        KO_DOCKER_REPO="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
        export KO_DOCKER_REPO
        VERSION="${TAG_NAME#v}"
        CORE_VERSION="${VERSION%%[-+]*}"
        MAJOR_MINOR="$(echo "$CORE_VERSION" | cut -d. -f1-2)"
        SHA_SHORT="${GITHUB_SHA:0:7}"

        ko build ./cmd/server \
          --bare \
          --platform=linux/amd64,linux/arm64 \
          --tags="${TAG_NAME},${VERSION},${MAJOR_MINOR},sha-${SHA_SHORT}" \
          --sbom=spdx \
          --image-refs=/tmp/image-refs.txt

        echo "Pushed images:"
        cat /tmp/image-refs.txt

  build-binaries:
    name: Build ${{ matrix.name }} binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            cmd: ./cmd/server
            prefix: workflow
            platforms: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64
            build_ui: true
          - name: wfctl
            cmd: ./cmd/wfctl
            prefix: wfctl
            platforms: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64
          - name: lsp-server
            cmd: ./cmd/workflow-lsp-server
            prefix: workflow-lsp-server
            platforms: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64
          - name: sandbox-runner
            cmd: ./cmd/workflow-sandbox-runner
            prefix: workflow-sandbox-runner
            # No windows: the agent shells to a Linux Docker daemon to run sandboxed containers.
            platforms: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Set up Node.js
      if: matrix.build_ui
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build UI assets (required for Go embed)
      if: matrix.build_ui
      run: |
        cd ui && npm ci && npm run build
        cd .. && mkdir -p module/ui_dist && cp -r ui/dist/* module/ui_dist/
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build binaries
      run: |
        mkdir -p dist
        VERSION=${TAG_NAME}
        LDFLAGS="-s -w -X main.version=${VERSION}"

        for platform in ${{ matrix.platforms }}; do
          GOOS="${platform%/*}"
          GOARCH="${platform#*/}"
          output="dist/${{ matrix.prefix }}-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            output="${output}.exe"
          fi
          echo "Building ${output}..."
          GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags="${LDFLAGS}" -o "${output}" ${{ matrix.cmd }}
        done

    - name: Upload binaries
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: binaries-${{ matrix.name }}
        path: dist/*
        retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-ui]

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Download all binary artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: binaries-*
        path: dist
        merge-multiple: true

    - name: Download admin UI artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: admin-ui
        path: dist

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Generate grpc-versions.txt
      # Cross-repo dep-sync foundation per
      # docs/plans/2026-05-10-strict-contracts-force-cutover.md Task 2.
      # Downstream plugins (e.g. workflow-plugin-digitalocean) gate their
      # protoc / proto-gen toolchain pins against this artifact so they
      # link against gRPC/protobuf versions ABI-compatible with this
      # workflow release.
      run: |
        set -euo pipefail
        # protoc-gen-go ships from the google.golang.org/protobuf module
        # (path google.golang.org/protobuf/cmd/protoc-gen-go is NOT a
        # standalone module), so its version line resolves against the
        # parent module — same Version, intentional dedup, not a copy-paste.
        {
          echo "grpc=$(go list -m -json google.golang.org/grpc | jq -r .Version)"
          echo "protobuf=$(go list -m -json google.golang.org/protobuf | jq -r .Version)"
          echo "protoc-gen-go=$(go list -m -json google.golang.org/protobuf | jq -r .Version)"
          echo "protoc-gen-go-grpc=$(go list -m -json google.golang.org/grpc/cmd/protoc-gen-go-grpc | jq -r .Version)"
        } > dist/grpc-versions.txt
        cat dist/grpc-versions.txt

    - name: Create checksums
      run: |
        cd dist
        sha256sum ./* | sed 's#  \./#  #' > checksums.txt

    - name: Create Release (draft during asset upload)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        prerelease_flag=()
        if [[ "${TAG_NAME}" == *-* ]]; then
          prerelease_flag+=(--prerelease)
        fi
        gh release create "${TAG_NAME}" dist/* \
          --repo "${GITHUB_REPOSITORY}" \
          --draft \
          --verify-tag \
          --generate-notes \
          "${prerelease_flag[@]}"

    - name: Publish release (was draft during asset upload)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release edit ${{ env.TAG_NAME }} --draft=false --repo ${{ github.repository }}

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-') }}
    steps:
    - name: Update wfctl formula in homebrew-tap
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      with:
        token: ${{ secrets.repo_dispatch_token }}
        repository: GoCodeAlone/homebrew-tap
        event-type: update-wfctl
        client-payload: '{"version": "${{ env.TAG_NAME }}"}'

  notify-ide-plugins:
    name: Notify IDE Plugins
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-') }}
    strategy:
      matrix:
        repo: ['GoCodeAlone/workflow-editor']
    steps:
    - name: Trigger IDE update for ${{ matrix.repo }}
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      with:
        token: ${{ secrets.repo_dispatch_token }}
        repository: ${{ matrix.repo }}
        event-type: workflow-release
        client-payload: '{"version": "${{ env.TAG_NAME }}"}'

  notify-workflow-registry:
    name: Notify workflow-registry
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-') }}
    steps:
    - name: Trigger registry manifest sync
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      with:
        token: ${{ secrets.repo_dispatch_token }}
        repository: GoCodeAlone/workflow-registry
        event-type: workflow-release
        client-payload: '{"workflow": "${{ github.repository }}", "version": "${{ env.TAG_NAME }}"}'

  notify-workflow-scenarios:
    name: Notify workflow-scenarios
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-') }}
    steps:
    - name: Trigger workflow-scenarios bump
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      with:
        token: ${{ secrets.repo_dispatch_token }}
        repository: GoCodeAlone/workflow-scenarios
        event-type: workflow-release
        client-payload: '{"workflow": "${{ github.repository }}", "tag": "${{ env.TAG_NAME }}"}'
