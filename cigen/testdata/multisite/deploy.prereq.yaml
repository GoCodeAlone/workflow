# gocodealone-multisite — infrastructure prerequisites.
#
# Phase 1 of two-phase deploy. Creates the long-lived DO resources that
# the app depends on, but does NOT touch App Platform.
#
# Resources provisioned:
#   - DigitalOcean Managed Postgres cluster (multisite-pg)
#   - DigitalOcean Spaces bucket for IaC state backend
#   - Generated secrets (HMAC, JWT, audit-sign, super-admin bootstrap)
#
# Run with:
#   wfctl infra plan -c deploy.prereq.yaml
#   wfctl infra apply -c deploy.prereq.yaml

infra:
  auto_bootstrap: true

secretStores:
  github-actions:
    provider: github
    config:
      repo: GoCodeAlone/gocodealone-multisite
      token_env: RELEASES_TOKEN

secrets:
  defaultStore: github-actions
  provider: github
  config:
    repo: GoCodeAlone/gocodealone-multisite
    token_env: RELEASES_TOKEN
  generate:
    - key: SPACES
      type: provider_credential
      source: digitalocean.spaces
      name: multisite-deploy-key
    - key: MULTISITE_INGEST_HMAC_SECRET
      type: random_hex
      length: 32
    - key: MULTISITE_JWT_SECRET
      type: random_hex
      length: 64
    - key: MULTISITE_AUDIT_SIGN_KEY
      type: random_hex
      length: 32
    - key: MULTISITE_SUPER_ADMIN_BOOTSTRAP_CODE
      type: random_hex
      length: 24
  entries:
    - name: DIGITALOCEAN_TOKEN
      description: DigitalOcean API token used by wfctl provider modules.
    - name: RELEASES_TOKEN
      description: GitHub token used by wfctl plugin install + GHCR pull credential derivation.
    - name: GHCR_CREDENTIALS
      description: GitHub Container Registry pull credential for DigitalOcean App Platform (username:token).
    - name: SPACES_access_key
      description: DO Spaces access key for the multisite IaC state backend. Generated by bootstrap.
    - name: SPACES_secret_key
      description: DO Spaces secret key for the multisite IaC state backend. Generated by bootstrap.
    - name: MULTISITE_CONTENT_REPO_TOKEN
      description: GitHub PAT with contents:read access to every content repo (gocodealone-website etc.). Set by operator.
    - name: MULTISITE_OAUTH_GOOGLE_CLIENT_ID
      description: Google OAuth client ID. Optional; required only if Google SSO enabled.
    - name: MULTISITE_OAUTH_GOOGLE_CLIENT_SECRET
      description: Google OAuth client secret. Optional.
    - name: MULTISITE_OAUTH_FACEBOOK_APP_ID
      description: Facebook OAuth app ID. Optional.
    - name: MULTISITE_OAUTH_FACEBOOK_APP_SECRET
      description: Facebook OAuth app secret. Optional.

modules:
  - name: do-provider
    type: iac.provider
    config:
      provider: digitalocean
      region: nyc3
      token: ${DIGITALOCEAN_TOKEN}
      spaces_access_key: ${SPACES_access_key}
      spaces_secret_key: ${SPACES_secret_key}

  - name: iac-state
    type: iac.state
    # Private DO Spaces bucket for wfctl-managed resource IDs, config
    # hashes, outputs, drift metadata. Survives failed mid-applies.
    config:
      backend: spaces
      bucket: multisite-iac-state
      prefix: prod/
      region: nyc3
      accessKey: ${SPACES_access_key}
      secretKey: ${SPACES_secret_key}

  - name: multisite-pg
    type: infra.database
    protected: true
    config:
      provider: do-provider
      engine: pg
      version: "18"
      size: db-s-1vcpu-1gb
      num_nodes: 1
      region: nyc3
      adopt_existing: true
