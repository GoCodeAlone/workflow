version: 0

workflows:
  cli:
    name: wfctl
    description: Workflow Engine CLI
    commands:
      - name: audit
        description: Audit Workflow ecosystem metadata and plugin contracts
      - name: init
        description: Scaffold a new workflow project from a template
      - name: validate
        description: Validate a workflow configuration file
      - name: inspect
        description: Inspect modules, workflows, and triggers in a config
      - name: run
        description: Run a workflow engine from a config file
      - name: plugin
        description: Plugin management
      - name: pipeline
        description: Pipeline management
      - name: schema
        description: Generate JSON Schema for workflow configs
      - name: snippets
        description: Export IDE snippets
      - name: manifest
        description: Analyze config and report infrastructure requirements
      - name: migrate
        description: Manage database schema migrations
      - name: build-ui
        description: Build the application UI
      - name: ui
        description: UI tooling
      - name: publish
        description: Prepare and publish a plugin manifest
      - name: deploy
        description: Deploy the workflow application
      - name: api
        description: API tooling
      - name: diff
        description: Compare two workflow config files
      - name: template
        description: Template management
      - name: contract
        description: Contract testing
      - name: compat
        description: Compatibility checking
      - name: generate
        description: Code generation
      - name: git
        description: Git integration
      - name: registry
        description: Container registry commands
      - name: plugin-registry
        description: Plugin catalog registry management
      - name: update
        description: Update wfctl
      - name: mcp
        description: Start the MCP server over stdio
      - name: modernize
        description: Detect and fix YAML config anti-patterns
      - name: expr-migrate
        description: Convert Go template expressions to expr syntax
      - name: infra
        description: Manage infrastructure lifecycle
      - name: docs
        description: Generate documentation from workflow configs
      - name: editor-schemas
        description: Export module schemas and type coercion rules
      - name: dsl-reference
        description: Parse DSL reference as structured JSON
      - name: ci
        description: CI/CD tooling
      - name: override
        description: Generate and verify environment overrides
      - name: test
        description: Run Workflow integration tests
      - name: secrets
        description: Manage declared secrets
      - name: ports
        description: Inspect port usage
      - name: security
        description: Security tooling
      - name: wizard
        description: Interactive project setup wizard
      - name: dev
        description: Local development cluster
      - name: build
        description: Build artifacts from ci.build config
      - name: scaffold
        description: Scaffold Workflow assets
      - name: tenant
        description: Tenant registry tooling

pipelines:
  cmd-audit:
    trigger: {type: cli, config: {command: audit}}
