secrets:
  provider: github
  generate:
    - key: POSTGRES_PASSWORD
      type: random_hex
      length: 32

modules:
  - name: do-provider
    type: iac.provider
    config:
      provider: digitalocean
      token: ${DIGITALOCEAN_TOKEN}
  - name: example-app
    type: infra.container_service
    config:
      services:
        - name: api
          image: "${IMAGE_REF}"
          env_vars:
            DEPLOY_ENV: staging
            AUTH_TOKEN: "${AUTH_TOKEN}"
          env_vars_secret:
            DB_URL: "${DATABASE_URL}"
  - name: example-droplet
    type: infra.droplet
    config:
      region: nyc3
      user_data: |
        #cloud-config
        write_files:
          - path: /opt/app/docker-compose.yml
            content: |
              services:
                postgres:
                  environment:
                    POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
