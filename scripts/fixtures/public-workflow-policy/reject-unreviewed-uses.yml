name: Forbidden unreviewed actions

on:
  pull_request:

jobs:
  unknown-action:
    runs-on: ubuntu-latest
    steps:
      - uses: octocat/unknown-action@v1

  local-action:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/not-reviewed

  docker-action:
    runs-on: ubuntu-latest
    steps:
      - uses: docker://alpine:3.20

  unlisted-provider-action:
    runs-on: ubuntu-latest
    steps:
      - uses: digitalocean/experimental-deploy@v1

  dynamic-action:
    runs-on: ubuntu-latest
    steps:
      - uses: ${{ vars.ACTION_REF }}

  changed-approved-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

  approved-action-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@main

  unreviewed-action-sha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@0123456789012345678901234567890123456789

  unknown-reusable-workflow:
    uses: acme/platform/.github/workflows/deploy.yml@main
