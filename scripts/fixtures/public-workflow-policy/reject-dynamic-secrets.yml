name: Forbidden dynamic credential selectors

on:
  pull_request:

env:
  DYNAMIC_NAME: ${{ secrets[vars.NAME] }}
  DYNAMIC_FORMAT: ${{ secrets[format('{0}_TOKEN', vars.PROVIDER)] }}
  KNOWN_DYNAMIC_NAME: ${{ secrets[vars.DIGITALOCEAN_TOKEN] }}
  KNOWN_VARIABLE: ${{ vars.DIGITALOCEAN_TOKEN }}
  WILDCARD_SECRET: ${{ secrets.* }}
  WHOLE_CONTEXT: ${{ secrets }}
  SERIALIZED_CONTEXT: ${{ toJSON(secrets) }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: go test ./...
