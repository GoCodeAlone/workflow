name: Forbidden bracket and global secret references

on:
  pull_request:

env:
  GLOBAL_AUTH_ALIAS: ${{ secrets['DEPLOY_AUTH'] }}
  PROVIDER_CREDENTIAL: ${{ secrets["DIGITALOCEAN_TOKEN"] }}

jobs:
  provider-action-with-global-alias:
    runs-on: ubuntu-latest
    steps:
      - uses: digitalocean/action-doctl@v2

  unreviewed-step-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use unreviewed package token
        env:
          PACKAGE_TOKEN: ${{ secrets['UNREVIEWED_TOKEN'] }}
        run: go test ./...
