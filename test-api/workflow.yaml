modules:
  - name: test-api-server
    type: http.server
    config:
      address: ":8080"

  - name: test-api-router
    type: http.router
    dependsOn:
      - test-api-server

  - name: test-api-api
    type: http.handler
    dependsOn:
      - test-api-router
    config:
      contentType: application/json

  - name: test-api-health
    type: health.checker
    config:
      description: "Health check endpoint for test-api"

  - name: test-api-metrics
    type: metrics.collector
    config:
      description: "Prometheus metrics for test-api"

workflows:
  http:
    router: test-api-router
    server: test-api-server
    routes:
      - method: GET
        path: /health
        handler: test-api-health
      - method: GET
        path: /api/items
        handler: test-api-api
      - method: POST
        path: /api/items
        handler: test-api-api
      - method: GET
        path: /api/items/{id}
        handler: test-api-api
      - method: PUT
        path: /api/items/{id}
        handler: test-api-api
      - method: DELETE
        path: /api/items/{id}
        handler: test-api-api

triggers:
  - name: http-trigger
    type: http
    config:
      server: test-api-server
