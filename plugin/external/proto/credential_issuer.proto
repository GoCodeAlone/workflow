syntax = "proto3";

package workflow.plugin.external.credentials;

option go_package = "github.com/GoCodeAlone/workflow/plugin/external/proto;proto";

// CredentialIssuer is an optional provider-owned service. Its absence is the
// negative capability signal; hosts discover it through PluginService's
// ContractRegistry and never route these operations through the legacy generic
// service path.
service CredentialIssuer {
  // DescribeSources returns the authoritative runtime declarations used to
  // validate every issuer response and to compare runtime capabilities with
  // plugin.json.
  rpc DescribeSources(CredentialSourceDeclarationsRequest) returns (CredentialSourceDeclarationsResponse);
  rpc Issue(CredentialIssueRequest) returns (CredentialIssueResponse);
  rpc List(CredentialListRequest) returns (CredentialListResponse);
  rpc Delete(CredentialDeleteRequest) returns (CredentialDeleteResponse);
}

enum CredentialConcurrencyMode {
  CREDENTIAL_CONCURRENCY_MODE_UNSPECIFIED = 0;
  CREDENTIAL_CONCURRENCY_MODE_PROVIDER_IDEMPOTENT = 1;
  CREDENTIAL_CONCURRENCY_MODE_SINGLE_WRITER_REQUIRED = 2;
}

// CredentialReconciliationState describes what the provider can prove after
// an issuance or deletion attempt. UNKNOWN_CREATED and AMBIGUOUS require
// operator reconciliation and must never trigger a blind retry.
enum CredentialReconciliationState {
  CREDENTIAL_RECONCILIATION_STATE_UNSPECIFIED = 0;
  CREDENTIAL_RECONCILIATION_STATE_CONFIRMED = 1;
  CREDENTIAL_RECONCILIATION_STATE_UNKNOWN = 2;
  CREDENTIAL_RECONCILIATION_STATE_UNKNOWN_CREATED = 3;
  CREDENTIAL_RECONCILIATION_STATE_AMBIGUOUS = 4;
}

message CredentialOutputDeclaration {
  string key = 1;
  // sensitive is the effective runtime value. Manifest omission is resolved
  // to true before providers construct this declaration.
  bool sensitive = 2;
}

message CredentialSourceDeclaration {
  string source = 1;
  CredentialConcurrencyMode concurrency_mode = 2;
  repeated CredentialOutputDeclaration outputs = 3;
  string identifier_key = 4;
}

message CredentialSourceDeclarationsRequest {}

message CredentialSourceDeclarationsResponse {
  repeated CredentialSourceDeclaration sources = 1;
  CredentialOperationError error = 2;
}

// CredentialSelector contains only provider-neutral inventory selectors.
// Provider-specific request configuration is carried separately as opaque
// JSON bytes owned by the provider implementation.
message CredentialSelector {
  string logical_name = 1;
  map<string, string> labels = 2;
  string operation_id = 3;
}

message CredentialOperationError {
  // code is a stable, non-secret machine-readable identifier.
  string code = 1;
  // message is safe for logs and terminal output. SDK adapters redact provider
  // error text rather than trusting it to exclude credential values.
  string message = 2;
  bool retryable = 3;
  CredentialReconciliationState reconciliation_state = 4;
  // identifiers may be used for cleanup guidance; credential values never
  // belong here.
  repeated CredentialIdentifier identifiers = 5;
}

message CredentialIdentifier {
  string value = 1;
  bool sensitive = 2;
}

message CredentialOutput {
  string key = 1;
  bytes value = 2;
  // The SDK sets sensitive from the authoritative source declaration instead
  // of trusting the provider-returned value.
  bool sensitive = 3;
}

message CredentialIssueRequest {
  string operation_id = 1;
  string source = 2;
  CredentialSelector selector = 3;
  bytes config_json = 4;
}

message CredentialIssueResponse {
  repeated CredentialOutput outputs = 1;
  string identifier = 2;
  bool identifier_sensitive = 3;
  CredentialReconciliationState reconciliation_state = 4;
  CredentialOperationError error = 5;
}

message CredentialListRequest {
  string source = 1;
  CredentialSelector selector = 2;
  string page_token = 3;
  uint32 page_size = 4;
}

message CredentialRecord {
  string identifier = 1;
  bool identifier_sensitive = 2;
  string logical_name = 3;
  string operation_id = 4;
  CredentialReconciliationState reconciliation_state = 5;
}

message CredentialListResponse {
  repeated CredentialRecord credentials = 1;
  string next_page_token = 2;
  CredentialOperationError error = 3;
}

message CredentialDeleteRequest {
  string operation_id = 1;
  string source = 2;
  string identifier = 3;
}

message CredentialDeleteResponse {
  string identifier = 1;
  CredentialReconciliationState reconciliation_state = 2;
  CredentialOperationError error = 3;
  bool identifier_sensitive = 4;
}
