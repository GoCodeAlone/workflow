syntax = "proto3";

package workflow.plugin.external.secrets;

option go_package = "github.com/GoCodeAlone/workflow/plugin/external/proto;proto";

import "google/protobuf/timestamp.proto";

// SecretStore is an optional provider-owned, read-only service. Mutation
// operations deliberately remain outside this transport.
service SecretStore {
  // DescribeSecretStores returns the authoritative exact type, operation, and
  // scope declarations used for runtime selection and parity checks.
  rpc DescribeSecretStores(SecretStoreDeclarationsRequest) returns (SecretStoreDeclarationsResponse);
  rpc Get(SecretStoreGetRequest) returns (SecretStoreGetResponse);
  rpc List(SecretStoreListRequest) returns (SecretStoreListResponse);
  rpc StatAll(SecretStoreStatAllRequest) returns (SecretStoreStatAllResponse);
  rpc CheckAccess(SecretStoreCheckAccessRequest) returns (SecretStoreCheckAccessResponse);
}

message SecretStoreDeclaration {
  string type = 1;
  repeated string operations = 2;
  repeated string scopes = 3;
}

message SecretStoreDeclarationsRequest {}

message SecretStoreDeclarationsResponse {
  repeated SecretStoreDeclaration stores = 1;
  SecretStoreError error = 2;
}

// SecretStoreTarget carries only generic routing fields. config_json is opaque
// provider-owned configuration; the SDK validates its shape and bound without
// interpreting its contents.
message SecretStoreTarget {
  string type = 1;
  string scope = 2;
  bytes config_json = 3;
}

message SecretStoreGetRequest {
  SecretStoreTarget target = 1;
  string key = 2;
}

message SecretStoreGetResult {
  // value is sensitive and is returned only by Get.
  bytes value = 1;
}

message SecretStoreGetResponse {
  SecretStoreGetResult result = 1;
  SecretStoreError error = 2;
}

message SecretStoreListRequest {
  SecretStoreTarget target = 1;
  // page_size is zero for the SDK default or at most the documented maximum.
  int32 page_size = 2;
  bytes page_token = 3;
}

message SecretStoreListResult {
  repeated string names = 1;
  bytes next_page_token = 2;
}

message SecretStoreListResponse {
  SecretStoreListResult result = 1;
  SecretStoreError error = 2;
}

message SecretStoreStatAllRequest {
  SecretStoreTarget target = 1;
  // page_size is zero for the SDK default or at most the documented maximum.
  int32 page_size = 2;
  bytes page_token = 3;
}

message SecretStoreMetadata {
  string name = 1;
  bool exists = 2;
  // updated_at is absent when the provider does not expose freshness.
  google.protobuf.Timestamp updated_at = 3;
}

message SecretStoreStatAllResult {
  repeated SecretStoreMetadata items = 1;
  bytes next_page_token = 2;
}

message SecretStoreStatAllResponse {
  SecretStoreStatAllResult result = 1;
  SecretStoreError error = 2;
}

message SecretStoreCheckAccessRequest {
  SecretStoreTarget target = 1;
}

// A nil error is the complete success result. No secret data is returned.
message SecretStoreCheckAccessResponse {
  SecretStoreError error = 1;
}

message SecretStoreError {
  // code is a stable, non-secret machine-readable identifier.
  string code = 1;
  // message is SDK-sanitized and never contains provider error text.
  string message = 2;
  bool retryable = 3;
}
