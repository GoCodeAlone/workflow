syntax = "proto3";

package workflow.plugin.external.credentials;

option go_package = "github.com/GoCodeAlone/workflow/plugin/external/proto;proto";

// CredentialResolver is an optional provider-owned read-only service. It is
// deliberately separate from credential issuance: resolution has no mutation
// operation IDs, reconciliation state, or concurrency policy.
service CredentialResolver {
  // DescribeResolvers returns the authoritative provider/type declarations
  // used for exact-match host selection and manifest/runtime parity checks.
  rpc DescribeResolvers(CredentialResolverDeclarationsRequest) returns (CredentialResolverDeclarationsResponse);
  rpc Resolve(CredentialResolveRequest) returns (CredentialResolveResponse);
}

message CredentialResolverDeclaration {
  string provider = 1;
  repeated string credential_types = 2;
}

message CredentialResolverDeclarationsRequest {}

message CredentialResolverDeclarationsResponse {
  repeated CredentialResolverDeclaration resolvers = 1;
  CredentialResolutionError error = 2;
}

message CredentialResolveRequest {
  string provider = 1;
  string credential_type = 2;
  // config_json is opaque provider-owned configuration. Core validates only
  // that it is JSON and never interprets provider-specific fields.
  bytes config_json = 3;
}

// ResolvedCloudCredentials mirrors cloud.account's public output contract.
// Secret-bearing values are response data only and must never be reflected in
// CredentialResolutionError or transport error text.
message ResolvedCloudCredentials {
  string provider = 1;
  string region = 2;

  string access_key = 3;
  string secret_key = 4;
  string session_token = 5;
  string role_arn = 6;

  string project_id = 7;
  bytes service_account_json = 8;

  string tenant_id = 9;
  string client_id = 10;
  string client_secret = 11;
  string subscription_id = 12;

  bytes kubeconfig = 13;
  string context = 14;

  string token = 15;
  map<string, string> extra = 16;
}

message CredentialResolutionError {
  // code is a stable, non-secret machine-readable identifier.
  string code = 1;
  // message is sanitized by the SDK and never contains provider error text.
  string message = 2;
  bool retryable = 3;
}

message CredentialResolveResponse {
  ResolvedCloudCredentials credentials = 1;
  CredentialResolutionError error = 2;
}
