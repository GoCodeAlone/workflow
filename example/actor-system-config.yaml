# Actor System Config Example
#
# Demonstrates the actor model plugin: stateful actors with message-based
# workflows, triggered via HTTP endpoints.

modules:
  # HTTP infrastructure
  - name: api-http-server
    type: http.server
    config:
      address: ":8080"
  - name: api-router
    type: http.router
  - name: orders-handler
    type: http.handler
    config:
      contentType: application/json

  # Actor infrastructure
  - name: main-actors
    type: actor.system
    config:
      shutdownTimeout: 30s
      defaultRecovery:
        failureScope: isolated
        action: restart
        maxRetries: 5
        retryWindow: 30s

  - name: order-processors
    type: actor.pool
    config:
      system: main-actors
      mode: auto-managed
      idleTimeout: 10m
      routing: sticky
      routingKey: order_id

workflows:
  # HTTP routes for triggering actor interactions
  http:
    routes:
      - method: POST
        path: /api/orders
        handler: orders-handler
      - method: GET
        path: /api/orders/{order_id}
        handler: orders-handler

  # Actor message handlers
  actors:
    pools:
      order-processors:
        receive:
          PlaceOrder:
            description: Place a new order and set it to pending status
            steps:
              - name: set-status
                type: step.set
                config:
                  values:
                    status: pending
                    order_id: "{{ .message.payload.order_id }}"
                    item: "{{ .message.payload.item }}"
                    quantity: "{{ .message.payload.quantity }}"

          GetOrderStatus:
            description: Retrieve the current order status from actor state
            steps:
              - name: respond
                type: step.set
                config:
                  values:
                    order_id: "{{ .state.order_id }}"
                    status: "{{ .state.status }}"
                    item: "{{ .state.item }}"

  # HTTP pipeline for order placement (calls actor)
  pipeline:
    - name: place-order
      trigger:
        type: http
        config:
          method: POST
          path: /api/orders
          handler: orders-handler
      steps:
        - name: parse-body
          type: step.request_parse
          config:
            format: json
        - name: send-to-actor
          type: step.actor_ask
          config:
            pool: order-processors
            identity: "{{ .order_id }}"
            timeout: 10s
            message:
              type: PlaceOrder
              payload:
                order_id: "{{ .order_id }}"
                item: "{{ .item }}"
                quantity: "{{ .quantity }}"
        - name: respond
          type: step.json_response
          config:
            status: 201
            body:
              order_id: "{{ .state.order_id }}"
              status: "{{ .state.status }}"

    - name: get-order
      trigger:
        type: http
        config:
          method: GET
          path: /api/orders/{order_id}
          handler: orders-handler
      steps:
        - name: parse-path
          type: step.validate_path_param
          config:
            param: order_id
        - name: ask-actor
          type: step.actor_ask
          config:
            pool: order-processors
            identity: "{{ .order_id }}"
            timeout: 10s
            message:
              type: GetOrderStatus
              payload: {}
        - name: respond
          type: step.json_response
          config:
            status: 200
            body:
              order_id: "{{ .state.order_id }}"
              status: "{{ .state.status }}"
              item: "{{ .state.item }}"
