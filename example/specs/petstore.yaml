openapi: "3.0.0"
info:
  title: Petstore API
  version: "1.0.0"
  description: A sample pet store API based on the OpenAPI 3.0 Petstore example

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                      minLength: 1
                      maxLength: 100
                    tag:
                      type: string
                      maxLength: 50
        "400":
          description: Invalid request
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                tag:
                  type: string
                  maxLength: 50
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  tag:
                    type: string
        "400":
          description: Validation error

  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  tag:
                    type: string
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string

  /pets/{petId}/status:
    put:
      operationId: updatePetStatus
      summary: Update pet status
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - available
                    - pending
                    - sold
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - status
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                    enum:
                      - available
                      - pending
                      - sold
        "400":
          description: Invalid status
        "404":
          description: Pet not found
