openapi: "3.0.0"
info:
  title: Articles API (JSON:API)
  version: "1.0.0"
  description: |
    A sample API that returns JSON:API (https://jsonapi.org/) compliant responses.
    Demonstrates OpenAPI response validation against a complex JSON:API envelope.

paths:
  /articles:
    get:
      operationId: listArticles
      summary: List all articles
      x-pipeline: list-articles
      parameters:
        - name: page[number]
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: page[size]
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A JSON:API compliant list of articles
          content:
            application/vnd.api+json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - type
                        - id
                        - attributes
                      properties:
                        type:
                          type: string
                        id:
                          type: string
                        attributes:
                          type: object
                          required:
                            - title
                          properties:
                            title:
                              type: string
                            body:
                              type: string
                            created_at:
                              type: string
                        relationships:
                          type: object
                          properties:
                            author:
                              type: object
                              properties:
                                data:
                                  type: object
                                  required:
                                    - type
                                    - id
                                  properties:
                                    type:
                                      type: string
                                    id:
                                      type: string
                  included:
                    type: array
                    items:
                      type: object
                      required:
                        - type
                        - id
                      properties:
                        type:
                          type: string
                        id:
                          type: string
                        attributes:
                          type: object
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      per_page:
                        type: integer
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                      first:
                        type: string
                      last:
                        type: string
                      next:
                        type: string
                      prev:
                        type: string

  /articles/{id}:
    get:
      operationId: getArticle
      summary: Get a single article
      x-pipeline: get-article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single article resource
          content:
            application/vnd.api+json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - type
                      - id
                      - attributes
                    properties:
                      type:
                        type: string
                      id:
                        type: string
                      attributes:
                        type: object
                        required:
                          - title
                        properties:
                          title:
                            type: string
                          body:
                            type: string
                          created_at:
                            type: string
                      relationships:
                        type: object
                  links:
                    type: object
                    properties:
                      self:
                        type: string
        "404":
          description: Article not found
          content:
            application/vnd.api+json:
              schema:
                type: object
                required:
                  - errors
                properties:
                  errors:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      required:
                        - status
                        - title
                      properties:
                        status:
                          type: string
                        title:
                          type: string
                        detail:
                          type: string
